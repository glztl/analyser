version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: analyser-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - analyser-net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: analyser-backend
    expose:
      - "8000"
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - DEBUG=false
      - UPLOAD_DIR=/app/uploads
      - SANDBOX_OUTPUT_DIR=/app/outputs
    volumes:
      - analyser-uploads:/app/uploads
      - analyser-outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - analyser-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'

  postgres:
    image: postgres:16-alpine
    container_name: analyser-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # 生产环境建议注释掉，只允许内网访问
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analyser-net

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    # PostgreSQL 优化配置（4GB 内存）
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=50

  redis:
    image: redis:7-alpine
    container_name: analyser-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analyser-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: analyser-migrate
    command: python -m alembic upgrade head
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - analyser-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

networks:
  analyser-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  analyser-uploads:
  analyser-outputs:
