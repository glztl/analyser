name: 🚀 Deploy Test

on:
  workflow_dispatch:  # 只保留手动触发

jobs:
  test:
    name: 🔧 Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🖨️ Print Info
        run: |
          echo "✅ Workflow triggered!"
          echo "Branch: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
      
      - name: 🔑 Test SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TENCENT_SSH_KEY }}
      
      - name: 📡 Connect
        run: |
          ssh-keyscan -H ${{ secrets.TENCENT_HOST }} >> ~/.ssh/known_hosts
          ssh -o StrictHostKeyChecking=no ${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }} \
            "echo '✅ Connected!' && docker ps --format 'table {{.Names}}\t{{.Status}}'"