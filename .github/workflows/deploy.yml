name: 🚀 Deploy to Tencent Cloud

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose*.yml'
      - '.github/workflows/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========== 1. 构建并推送镜像 ==========
  build-and-push:
    name: 🏗️ Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=sha,format=long
            type=ref,event=branch
            latest

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: 🐍 Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}-backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ⚛️ Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== 2. 部署到服务器 ==========
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TENCENT_SSH_KEY }}

      - name: 📋 Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.TENCENT_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy via SSH
        run: |
          ssh ${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }} << 'EOF'
            set -e
            cd /opt/analyser
            
            echo "📦 Pulling latest code..."
            git pull origin main
            
            echo "🔐 Loading environment..."
            if [ ! -f .env ]; then
              echo "❌ .env not found! Create it manually first."
              exit 1
            fi
            
            echo "🏗️ Pulling and rebuilding services..."
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate
            
            echo "🔄 Running database migrations..."
            docker compose -f docker-compose.prod.yml run --rm migrate || true
            
            echo "⏳ Waiting for health checks..."
            sleep 45
            
            echo "🧹 Cleaning up old images..."
            docker image prune -f --filter "label=org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
            
            echo "✅ Deployment complete!"
            docker compose -f docker-compose.prod.yml ps
          EOF

      - name: 🏓 Health check
        run: |
          echo "⏳ Waiting for services to be healthy..."
          sleep 15
          
          # 检查前端
          if ! curl -sf http://${{ secrets.TENCENT_HOST }}/health; then
            echo "❌ Frontend health check failed"
            exit 1
          fi
          
          # 检查后端
          if ! curl -sf http://${{ secrets.TENCENT_HOST }}/api/health; then
            echo "❌ Backend health check failed"
            exit 1
          fi

          echo "✅ All services healthy!"